name: Monthly Check-in

on:
  schedule:
    # 23rd of each month 8:00 PM CDT = 1:00 AM UTC on the 24th
    - cron: '0 1 24 * *'
  workflow_dispatch:

jobs:
  send-checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Send monthly check-in
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/monthly_checkin.py
